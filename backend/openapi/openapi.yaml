openapi: 3.1.0
info:
  title: ptydeck API
  version: 0.1.0
  description: OpenAPI contract for ptydeck session lifecycle and terminal control.
servers:
  - url: /api/v1
paths:
  /auth/dev-token:
    post:
      operationId: createDevToken
      summary: Create development bearer token (available only in auth dev mode).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDevTokenRequest'
      responses:
        '200':
          description: Token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Auth dev mode is disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /auth/ws-ticket:
    post:
      operationId: createWsTicket
      summary: Create a short-lived one-time WebSocket handshake ticket from an authenticated bearer session.
      responses:
        '200':
          description: WebSocket ticket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WsTicketResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Missing ws:connect scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /custom-commands:
    get:
      operationId: listCustomCommands
      summary: List persisted custom commands.
      responses:
        '200':
          description: Custom command list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomCommand'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /custom-commands/{commandName}:
    parameters:
      - $ref: '#/components/parameters/commandName'
    get:
      operationId: getCustomCommand
      summary: Get custom command by name.
      responses:
        '200':
          description: Custom command found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomCommand'
        '404':
          description: Custom command not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
    put:
      operationId: upsertCustomCommand
      summary: Create or overwrite custom command by name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertCustomCommandRequest'
      responses:
        '200':
          description: Custom command upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomCommand'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Custom command name conflict or limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
    delete:
      operationId: deleteCustomCommand
      summary: Delete custom command by name.
      responses:
        '204':
          description: Custom command deleted
        '404':
          description: Custom command not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /decks:
    get:
      operationId: listDecks
      summary: List decks.
      responses:
        '200':
          description: Deck list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Deck'
        '426':
          $ref: '#/components/responses/TlsRequired'
    post:
      operationId: createDeck
      summary: Create deck.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeckRequest'
      responses:
        '201':
          description: Deck created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deck'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Deck id already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /decks/{deckId}:
    parameters:
      - $ref: '#/components/parameters/deckId'
    get:
      operationId: getDeck
      summary: Get deck by id.
      responses:
        '200':
          description: Deck found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deck'
        '404':
          description: Deck not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
    patch:
      operationId: updateDeck
      summary: Update deck metadata/settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeckRequest'
      responses:
        '200':
          description: Deck updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deck'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Deck not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
    delete:
      operationId: deleteDeck
      summary: Delete deck by id.
      parameters:
        - name: force
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: Deck deleted
        '400':
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Deck not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Deck delete conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /decks/{deckId}/sessions/{sessionId}:move:
    parameters:
      - $ref: '#/components/parameters/deckId'
      - $ref: '#/components/parameters/sessionId'
    post:
      operationId: moveSessionToDeck
      summary: Move session to deck.
      responses:
        '204':
          description: Move accepted
        '404':
          description: Deck or session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /layout-profiles:
    get:
      operationId: listLayoutProfiles
      summary: List persisted layout profiles.
      responses:
        '200':
          description: Layout profile list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LayoutProfile'
        '426':
          $ref: '#/components/responses/TlsRequired'
    post:
      operationId: createLayoutProfile
      summary: Create a persisted layout profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLayoutProfileRequest'
      responses:
        '201':
          description: Layout profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LayoutProfile'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Layout profile id already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /layout-profiles/{profileId}:
    parameters:
      - $ref: '#/components/parameters/profileId'
    get:
      operationId: getLayoutProfile
      summary: Get layout profile by id.
      responses:
        '200':
          description: Layout profile found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LayoutProfile'
        '404':
          description: Layout profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
    patch:
      operationId: updateLayoutProfile
      summary: Update persisted layout profile metadata/layout.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLayoutProfileRequest'
      responses:
        '200':
          description: Layout profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LayoutProfile'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Layout profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
    delete:
      operationId: deleteLayoutProfile
      summary: Delete persisted layout profile by id.
      responses:
        '204':
          description: Layout profile deleted
        '404':
          description: Layout profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /sessions:
    get:
      operationId: listSessions
      summary: List sessions
      parameters:
        - name: deckId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'
        '426':
          $ref: '#/components/responses/TlsRequired'
    post:
      operationId: createSession
      summary: Create session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Session concurrency limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /sessions/{sessionId}:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    get:
      operationId: getSession
      summary: Get session
      responses:
        '200':
          description: Session found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
    delete:
      operationId: deleteSession
      summary: Delete session
      responses:
        '204':
          description: Session deleted
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
    patch:
      operationId: updateSession
      summary: Update session metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSessionRequest'
      responses:
        '200':
          description: Session updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /sessions/{sessionId}/replay-export:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    get:
      operationId: getSessionReplayExport
      summary: Export the currently retained replay tail for a session.
      responses:
        '200':
          description: Replay export payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionReplayExport'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /sessions/{sessionId}/input:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    post:
      operationId: sendInput
      summary: Send input bytes to a session PTY.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: string
      responses:
        '204':
          description: Input accepted
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /sessions/{sessionId}/resize:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    post:
      operationId: resizeSession
      summary: Resize session terminal dimensions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cols, rows]
              properties:
                cols:
                  type: integer
                  minimum: 1
                rows:
                  type: integer
                  minimum: 1
      responses:
        '204':
          description: Resize accepted
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /sessions/{sessionId}/restart:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    post:
      operationId: restartSession
      summary: Restart session process while preserving session identity.
      responses:
        '200':
          description: Session restarted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
components:
  parameters:
    sessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    commandName:
      name: commandName
      in: path
      required: true
      schema:
        type: string
    deckId:
      name: deckId
      in: path
      required: true
      schema:
        type: string
    profileId:
      name: profileId
      in: path
      required: true
      schema:
        type: string
  schemas:
    Deck:
      type: object
      required:
        - id
        - name
        - settings
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        settings:
          $ref: '#/components/schemas/DeckSettings'
        createdAt:
          type: integer
          format: int64
        updatedAt:
          type: integer
          format: int64
    DeckSettings:
      type: object
      additionalProperties: true
    CreateDeckRequest:
      type: object
      required:
        - name
      properties:
        id:
          type: string
        name:
          type: string
        settings:
          $ref: '#/components/schemas/DeckSettings'
    UpdateDeckRequest:
      type: object
      properties:
        name:
          type: string
        settings:
          $ref: '#/components/schemas/DeckSettings'
    LayoutProfile:
      type: object
      required:
        - id
        - name
        - createdAt
        - updatedAt
        - layout
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: integer
          format: int64
        updatedAt:
          type: integer
          format: int64
        layout:
          $ref: '#/components/schemas/LayoutProfileLayout'
    LayoutProfileLayout:
      type: object
      required:
        - activeDeckId
        - sidebarVisible
        - sessionFilterText
        - deckTerminalSettings
      properties:
        activeDeckId:
          type: string
        sidebarVisible:
          type: boolean
        sessionFilterText:
          type: string
        deckTerminalSettings:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/LayoutProfileDeckTerminalSettings'
    LayoutProfileDeckTerminalSettings:
      type: object
      required:
        - cols
        - rows
      properties:
        cols:
          type: integer
          minimum: 20
          maximum: 400
        rows:
          type: integer
          minimum: 5
          maximum: 120
    CreateLayoutProfileRequest:
      type: object
      required:
        - name
      properties:
        id:
          type: string
        name:
          type: string
        layout:
          $ref: '#/components/schemas/LayoutProfileLayout'
    UpdateLayoutProfileRequest:
      type: object
      properties:
        name:
          type: string
        layout:
          $ref: '#/components/schemas/LayoutProfileLayout'
    Session:
      type: object
      required:
        - id
        - deckId
        - state
        - activityState
        - cwd
        - shell
        - inputSafetyProfile
        - tags
        - createdAt
        - updatedAt
        - activityUpdatedAt
      properties:
        id:
          type: string
        deckId:
          type: string
        state:
          type: string
          enum:
            - starting
            - running
            - unrestored
        activityState:
          type: string
          enum:
            - active
            - inactive
        cwd:
          type: string
        shell:
          type: string
        name:
          type: string
        note:
          type: string
        inputSafetyProfile:
          $ref: '#/components/schemas/SessionInputSafetyProfile'
        startCwd:
          type: string
        startCommand:
          type: string
        env:
          type: object
          additionalProperties:
            type: string
        tags:
          type: array
          items:
            type: string
        themeProfile:
          $ref: '#/components/schemas/SessionThemeProfile'
        activeThemeProfile:
          $ref: '#/components/schemas/SessionThemeProfile'
        inactiveThemeProfile:
          $ref: '#/components/schemas/SessionThemeProfile'
        createdAt:
          type: integer
          format: int64
        updatedAt:
          type: integer
          format: int64
        activityUpdatedAt:
          type: integer
          format: int64
          nullable: true
        activityCompletedAt:
          type: integer
          format: int64
          nullable: true
        startedAt:
          type: integer
          format: int64
          nullable: true
        exitCode:
          type: integer
          nullable: true
        exitSignal:
          type: string
        exitedAt:
          type: integer
          format: int64
          nullable: true
    SessionReplayExport:
      type: object
      required:
        - sessionId
        - sessionState
        - scope
        - format
        - contentType
        - fileName
        - data
        - retainedChars
        - retentionLimitChars
        - truncated
      properties:
        sessionId:
          type: string
        sessionState:
          type: string
          enum:
            - starting
            - running
            - exited
            - unrestored
        scope:
          type: string
          enum:
            - retained_replay_tail
        format:
          type: string
          enum:
            - text
        contentType:
          type: string
        fileName:
          type: string
        data:
          type: string
        retainedChars:
          type: integer
          minimum: 0
        retentionLimitChars:
          type: integer
          minimum: 0
        truncated:
          type: boolean
    CustomCommand:
      type: object
      required:
        - name
        - content
        - createdAt
        - updatedAt
      properties:
        name:
          type: string
        content:
          type: string
        createdAt:
          type: integer
        updatedAt:
          type: integer
    UpsertCustomCommandRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
    CreateSessionRequest:
      type: object
      properties:
        cwd:
          type: string
        shell:
          type: string
        name:
          type: string
        note:
          type: string
        inputSafetyProfile:
          $ref: '#/components/schemas/SessionInputSafetyProfile'
        startCwd:
          type: string
        startCommand:
          type: string
        env:
          type: object
          additionalProperties:
            type: string
        tags:
          type: array
          items:
            type: string
        themeProfile:
          $ref: '#/components/schemas/SessionThemeProfile'
        activeThemeProfile:
          $ref: '#/components/schemas/SessionThemeProfile'
        inactiveThemeProfile:
          $ref: '#/components/schemas/SessionThemeProfile'
    UpdateSessionRequest:
      type: object
      properties:
        name:
          type: string
        note:
          type: string
        inputSafetyProfile:
          $ref: '#/components/schemas/SessionInputSafetyProfile'
        startCwd:
          type: string
        startCommand:
          type: string
        env:
          type: object
          additionalProperties:
            type: string
        tags:
          type: array
          items:
            type: string
        themeProfile:
          $ref: '#/components/schemas/SessionThemeProfile'
        activeThemeProfile:
          $ref: '#/components/schemas/SessionThemeProfile'
        inactiveThemeProfile:
          $ref: '#/components/schemas/SessionThemeProfile'
    SessionInputSafetyProfile:
      type: object
      required:
        - requireValidShellSyntax
        - confirmOnIncompleteShellConstruct
        - confirmOnNaturalLanguageInput
        - confirmOnDangerousShellCommand
        - confirmOnMultilineInput
        - confirmOnRecentTargetSwitch
        - targetSwitchGraceMs
        - pasteLengthConfirmThreshold
        - pasteLineConfirmThreshold
      properties:
        requireValidShellSyntax:
          type: boolean
        confirmOnIncompleteShellConstruct:
          type: boolean
        confirmOnNaturalLanguageInput:
          type: boolean
        confirmOnDangerousShellCommand:
          type: boolean
        confirmOnMultilineInput:
          type: boolean
        confirmOnRecentTargetSwitch:
          type: boolean
        targetSwitchGraceMs:
          type: integer
          minimum: 0
          maximum: 60000
        pasteLengthConfirmThreshold:
          type: integer
          minimum: 0
          maximum: 20000
        pasteLineConfirmThreshold:
          type: integer
          minimum: 0
          maximum: 1000
    SessionThemeProfile:
      type: object
      required:
        - background
        - foreground
        - cursor
        - black
        - red
        - green
        - yellow
        - blue
        - magenta
        - cyan
        - white
        - brightBlack
        - brightRed
        - brightGreen
        - brightYellow
        - brightBlue
        - brightMagenta
        - brightCyan
        - brightWhite
      additionalProperties: false
      properties:
        background:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        foreground:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        cursor:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        black:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        red:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        green:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        yellow:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        blue:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        magenta:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        cyan:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        white:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        brightBlack:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        brightRed:
