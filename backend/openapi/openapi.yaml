openapi: 3.1.0
info:
  title: ptydeck API
  version: 0.1.0
  description: OpenAPI contract for ptydeck session lifecycle and terminal control.
servers:
  - url: /api/v1
paths:
  /auth/dev-token:
    post:
      operationId: createDevToken
      summary: Create development bearer token (available only in auth dev mode).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDevTokenRequest'
      responses:
        '200':
          description: Token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Auth dev mode is disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /custom-commands:
    get:
      operationId: listCustomCommands
      summary: List persisted custom commands.
      responses:
        '200':
          description: Custom command list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomCommand'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /custom-commands/{commandName}:
    parameters:
      - $ref: '#/components/parameters/commandName'
    get:
      operationId: getCustomCommand
      summary: Get custom command by name.
      responses:
        '200':
          description: Custom command found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomCommand'
        '404':
          description: Custom command not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
    put:
      operationId: upsertCustomCommand
      summary: Create or overwrite custom command by name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertCustomCommandRequest'
      responses:
        '200':
          description: Custom command upserted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomCommand'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Custom command name conflict or limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
    delete:
      operationId: deleteCustomCommand
      summary: Delete custom command by name.
      responses:
        '204':
          description: Custom command deleted
        '404':
          description: Custom command not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /decks:
    get:
      operationId: listDecks
      summary: List decks.
      responses:
        '200':
          description: Deck list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Deck'
        '426':
          $ref: '#/components/responses/TlsRequired'
    post:
      operationId: createDeck
      summary: Create deck.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeckRequest'
      responses:
        '201':
          description: Deck created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deck'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Deck id already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /decks/{deckId}:
    parameters:
      - $ref: '#/components/parameters/deckId'
    get:
      operationId: getDeck
      summary: Get deck by id.
      responses:
        '200':
          description: Deck found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deck'
        '404':
          description: Deck not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
    patch:
      operationId: updateDeck
      summary: Update deck metadata/settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeckRequest'
      responses:
        '200':
          description: Deck updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deck'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Deck not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
    delete:
      operationId: deleteDeck
      summary: Delete deck by id.
      responses:
        '204':
          description: Deck deleted
        '404':
          description: Deck not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Deck delete conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /decks/{deckId}/sessions/{sessionId}:move:
    parameters:
      - $ref: '#/components/parameters/deckId'
      - $ref: '#/components/parameters/sessionId'
    post:
      operationId: moveSessionToDeck
      summary: Move session to deck.
      responses:
        '204':
          description: Move accepted
        '404':
          description: Deck or session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /sessions:
    get:
      operationId: listSessions
      summary: List sessions
      parameters:
        - name: deckId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'
        '426':
          $ref: '#/components/responses/TlsRequired'
    post:
      operationId: createSession
      summary: Create session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Session concurrency limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /sessions/{sessionId}:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    get:
      operationId: getSession
      summary: Get session
      responses:
        '200':
          description: Session found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
    delete:
      operationId: deleteSession
      summary: Delete session
      responses:
        '204':
          description: Session deleted
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
    patch:
      operationId: updateSession
      summary: Update session metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSessionRequest'
      responses:
        '200':
          description: Session updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /sessions/{sessionId}/input:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    post:
      operationId: sendInput
      summary: Send input bytes to a session PTY.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: string
      responses:
        '204':
          description: Input accepted
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /sessions/{sessionId}/resize:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    post:
      operationId: resizeSession
      summary: Resize session terminal dimensions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cols, rows]
              properties:
                cols:
                  type: integer
                  minimum: 1
                rows:
                  type: integer
                  minimum: 1
      responses:
        '204':
          description: Resize accepted
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
  /sessions/{sessionId}/restart:
    parameters:
      - $ref: '#/components/parameters/sessionId'
    post:
      operationId: restartSession
      summary: Restart session process while preserving session identity.
      responses:
        '200':
          description: Session restarted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '426':
          $ref: '#/components/responses/TlsRequired'
components:
  parameters:
    sessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    commandName:
      name: commandName
      in: path
      required: true
      schema:
        type: string
    deckId:
      name: deckId
      in: path
      required: true
      schema:
        type: string
  schemas:
    Deck:
      type: object
      required:
        - id
        - name
        - settings
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        settings:
          $ref: '#/components/schemas/DeckSettings'
        createdAt:
          type: integer
          format: int64
        updatedAt:
          type: integer
          format: int64
    DeckSettings:
      type: object
      additionalProperties: true
    CreateDeckRequest:
      type: object
      required:
        - name
      properties:
        id:
          type: string
        name:
          type: string
        settings:
          $ref: '#/components/schemas/DeckSettings'
    UpdateDeckRequest:
      type: object
      properties:
        name:
          type: string
        settings:
          $ref: '#/components/schemas/DeckSettings'
    Session:
      type: object
      required:
        - id
        - deckId
        - state
        - cwd
        - shell
        - tags
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        deckId:
          type: string
        state:
          type: string
          enum:
            - active
            - unrestored
        cwd:
          type: string
        shell:
          type: string
        name:
          type: string
        startCwd:
          type: string
        startCommand:
          type: string
        env:
          type: object
          additionalProperties:
            type: string
        tags:
          type: array
          items:
            type: string
        themeProfile:
          $ref: '#/components/schemas/SessionThemeProfile'
        createdAt:
          type: integer
          format: int64
        updatedAt:
          type: integer
          format: int64
    CustomCommand:
      type: object
      required:
        - name
        - content
        - createdAt
        - updatedAt
      properties:
        name:
          type: string
        content:
          type: string
        createdAt:
          type: integer
        updatedAt:
          type: integer
    UpsertCustomCommandRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
    CreateSessionRequest:
      type: object
      properties:
        cwd:
          type: string
        shell:
          type: string
        name:
          type: string
        startCwd:
          type: string
        startCommand:
          type: string
        env:
          type: object
          additionalProperties:
            type: string
        tags:
          type: array
          items:
            type: string
        themeProfile:
          $ref: '#/components/schemas/SessionThemeProfile'
    UpdateSessionRequest:
      type: object
      properties:
        name:
          type: string
        startCwd:
          type: string
        startCommand:
          type: string
        env:
          type: object
          additionalProperties:
            type: string
        tags:
          type: array
          items:
            type: string
        themeProfile:
          $ref: '#/components/schemas/SessionThemeProfile'
    SessionThemeProfile:
      type: object
      required:
        - background
        - foreground
        - cursor
        - black
        - red
        - green
        - yellow
        - blue
        - magenta
        - cyan
        - white
        - brightBlack
        - brightRed
        - brightGreen
        - brightYellow
        - brightBlue
        - brightMagenta
        - brightCyan
        - brightWhite
      additionalProperties: false
      properties:
        background:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        foreground:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        cursor:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        black:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        red:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        green:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        yellow:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        blue:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        magenta:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        cyan:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        white:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        brightBlack:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        brightRed:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        brightGreen:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        brightYellow:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        brightBlue:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        brightMagenta:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        brightCyan:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        brightWhite:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
    CreateDevTokenRequest:
      type: object
      properties:
        subject:
          type: string
        tenantId:
          type: string
        scopes:
          type: array
          items:
            type: string
    AuthTokenResponse:
      type: object
      required:
        - accessToken
        - tokenType
        - expiresIn
        - scope
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
        scope:
          type: string
  responses:
    TlsRequired:
      description: TLS is required for this endpoint.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
