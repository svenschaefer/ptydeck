<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ptydeck</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <h1>ptydeck</h1>
        <div id="connection-state" class="pill">connecting</div>
        <button id="create-session" type="button">New Session</button>
        <section class="settings-panel">
          <h2>Settings</h2>
          <div class="settings-grid">
            <label for="settings-cols">Cols</label>
            <input id="settings-cols" type="number" min="20" max="400" step="1" value="80" />
            <label for="settings-rows">Rows</label>
            <input id="settings-rows" type="number" min="5" max="120" step="1" value="20" />
            <label for="settings-send-terminator">Send Terminator</label>
            <select id="settings-send-terminator">
              <option value="auto">Auto (CR / Enter)</option>
              <option value="crlf">CRLF (\\r\\n)</option>
              <option value="lf">LF (\\n)</option>
              <option value="cr">CR (\\r)</option>
            </select>
          </div>
          <button id="settings-apply" type="button">Apply</button>
        </section>
      </aside>

      <section class="workspace">
        <main id="terminal-grid" class="terminal-grid"></main>
        <p id="empty-state" class="empty-state">No sessions yet. Create one to start.</p>

        <section class="command-row">
          <div class="command-input-column">
            <div class="command-meta">
              <p id="status-message" class="status-message"></p>
              <p id="command-feedback" class="command-feedback"></p>
            </div>
            <div class="command-entry-row">
              <div class="command-input-wrap">
                <textarea
                  id="command-input"
                  rows="10"
                  placeholder="Run command(s) in active session (Ctrl/Cmd+Enter to send)"
                ></textarea>
                <div id="command-inline-hint" class="command-inline-hint"></div>
                <p id="command-preview" class="command-preview"></p>
              </div>
              <button id="send-command" type="button">Send</button>
            </div>
            <pre id="command-suggestions" class="command-suggestions" hidden></pre>
          </div>
        </section>
      </section>
    </div>

    <template id="terminal-card-template">
      <article class="terminal-card">
        <div class="terminal-toolbar">
          <span class="session-quick-id"></span>
          <button class="session-focus" type="button"></button>
          <button class="session-settings" type="button" aria-label="Session settings">
            <span class="session-settings-icon" aria-hidden="true">&#9881;</span>
          </button>
        </div>
        <dialog class="session-settings-dialog">
          <div class="session-settings-head">
            <p class="session-settings-title">Session Settings</p>
            <div class="session-settings-head-actions">
              <button class="session-rename" type="button">Rename</button>
              <button class="session-close" type="button">Delete</button>
              <button class="session-settings-dismiss" type="button" aria-label="Close settings">x</button>
            </div>
          </div>
          <p class="session-settings-hint">Configure startup behavior, terminal theme, and session actions.</p>
          <div class="session-settings-layout">
            <section class="session-settings-section session-startup-controls">
              <p class="session-settings-section-title">Startup</p>
              <label class="session-startup-label">Working Directory</label>
              <input class="session-start-cwd" type="text" value="" />
              <label class="session-startup-label">Start Command Line</label>
              <textarea class="session-start-command" rows="2"></textarea>
              <label class="session-startup-label">Environment Variables (KEY=VALUE per line)</label>
              <textarea class="session-start-env" rows="4"></textarea>
              <p class="session-start-feedback"></p>
            </section>
            <section class="session-settings-section session-theme-controls">
              <p class="session-settings-section-title">Theme</p>
              <div class="session-theme-filter-grid">
                <label class="session-theme-label" for="">Theme Category</label>
                <select class="session-theme-category">
                  <option value="all">All</option>
                  <option value="dark">Dark</option>
                  <option value="light">Light</option>
                </select>
                <label class="session-theme-label" for="">Theme Search</label>
                <input class="session-theme-search" type="text" value="" placeholder="Search themes..." />
                <label class="session-theme-label" for="">Theme Preset</label>
                <select class="session-theme-select">
                  <option value="ptydeck-default">Ptydeck Default</option>
                  <option value="custom">Custom</option>
                </select>
              </div>
              <div class="session-theme-palette">
                <label class="session-theme-label" for="">Background</label>
                <input class="session-theme-bg session-theme-background" type="color" value="#0a0d12" />
                <label class="session-theme-label" for="">Foreground</label>
                <input class="session-theme-fg session-theme-foreground" type="color" value="#d8dee9" />
                <label class="session-theme-label" for="">Cursor</label>
                <input class="session-theme-cursor" type="color" value="#8ec07c" />
                <label class="session-theme-label" for="">Black</label>
                <input class="session-theme-black" type="color" value="#0a0d12" />
                <label class="session-theme-label" for="">Red</label>
                <input class="session-theme-red" type="color" value="#fb4934" />
                <label class="session-theme-label" for="">Green</label>
                <input class="session-theme-green" type="color" value="#8ec07c" />
                <label class="session-theme-label" for="">Yellow</label>
                <input class="session-theme-yellow" type="color" value="#fabd2f" />
                <label class="session-theme-label" for="">Blue</label>
                <input class="session-theme-blue" type="color" value="#83a598" />
                <label class="session-theme-label" for="">Magenta</label>
                <input class="session-theme-magenta" type="color" value="#b48ead" />
                <label class="session-theme-label" for="">Cyan</label>
                <input class="session-theme-cyan" type="color" value="#8fbcbb" />
                <label class="session-theme-label" for="">White</label>
                <input class="session-theme-white" type="color" value="#d8dee9" />
                <label class="session-theme-label" for="">Bright Black</label>
                <input class="session-theme-bright-black" type="color" value="#4b5563" />
                <label class="session-theme-label" for="">Bright Red</label>
                <input class="session-theme-bright-red" type="color" value="#ff6b5a" />
                <label class="session-theme-label" for="">Bright Green</label>
                <input class="session-theme-bright-green" type="color" value="#a5d68a" />
                <label class="session-theme-label" for="">Bright Yellow</label>
                <input class="session-theme-bright-yellow" type="color" value="#ffd36a" />
                <label class="session-theme-label" for="">Bright Blue</label>
                <input class="session-theme-bright-blue" type="color" value="#98b6cc" />
                <label class="session-theme-label" for="">Bright Magenta</label>
                <input class="session-theme-bright-magenta" type="color" value="#c8a7d8" />
                <label class="session-theme-label" for="">Bright Cyan</label>
                <input class="session-theme-bright-cyan" type="color" value="#a9d9d6" />
                <label class="session-theme-label" for="">Bright White</label>
                <input class="session-theme-bright-white" type="color" value="#f5f7fa" />
              </div>
            </section>
          </div>
          <div class="session-settings-footer">
            <p class="session-settings-status"></p>
            <div class="session-settings-footer-actions">
              <button class="session-settings-cancel" type="button">Cancel</button>
              <button class="session-settings-apply" type="button">Apply Changes</button>
            </div>
          </div>
        </dialog>
        <div class="terminal-mount"></div>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
