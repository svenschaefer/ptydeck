<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ptydeck</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <h1>ptydeck</h1>
        <div id="connection-state" class="pill">connecting</div>
        <button id="create-session" type="button">New Session</button>
        <section class="settings-panel">
          <h2>Settings</h2>
          <div class="settings-grid">
            <label for="settings-cols">Cols</label>
            <input id="settings-cols" type="number" min="20" max="400" step="1" value="80" />
            <label for="settings-rows">Rows</label>
            <input id="settings-rows" type="number" min="5" max="120" step="1" value="20" />
            <label for="settings-send-terminator">Send Terminator</label>
            <select id="settings-send-terminator">
              <option value="crlf">CRLF (\\r\\n)</option>
              <option value="lf">LF (\\n)</option>
              <option value="cr">CR (\\r)</option>
            </select>
          </div>
          <button id="settings-apply" type="button">Apply</button>
        </section>
      </aside>

      <section class="workspace">
        <main id="terminal-grid" class="terminal-grid"></main>
        <p id="empty-state" class="empty-state">No sessions yet. Create one to start.</p>

        <section class="command-row">
          <div class="command-input-column">
            <div class="command-meta">
              <p id="status-message" class="status-message"></p>
              <p id="command-feedback" class="command-feedback"></p>
            </div>
            <div class="command-entry-row">
              <div class="command-input-wrap">
                <textarea
                  id="command-input"
                  rows="10"
                  placeholder="Run command(s) in active session (Ctrl/Cmd+Enter to send)"
                ></textarea>
                <div id="command-inline-hint" class="command-inline-hint"></div>
                <p id="command-preview" class="command-preview"></p>
              </div>
              <button id="send-command" type="button">Send</button>
            </div>
            <pre id="command-suggestions" class="command-suggestions" hidden></pre>
          </div>
        </section>
      </section>
    </div>

    <template id="terminal-card-template">
      <article class="terminal-card">
        <div class="terminal-toolbar">
          <span class="session-quick-id"></span>
          <button class="session-focus" type="button"></button>
          <button class="session-settings" type="button" aria-label="Session settings">
            <span class="session-settings-icon" aria-hidden="true">&#9881;</span>
          </button>
        </div>
        <dialog class="session-settings-dialog">
          <div class="session-settings-head">
            <p class="session-settings-title">Session Settings</p>
            <button class="session-settings-dismiss" type="button" aria-label="Close settings">x</button>
          </div>
          <p class="session-settings-hint">Session-scoped settings controls are available here.</p>
          <div class="session-startup-controls">
            <label class="session-startup-label">Working Directory</label>
            <input class="session-start-cwd" type="text" value="" />
            <label class="session-startup-label">Start Command Line</label>
            <textarea class="session-start-command" rows="2"></textarea>
            <label class="session-startup-label">Environment Variables (KEY=VALUE per line)</label>
            <textarea class="session-start-env" rows="4"></textarea>
            <button class="session-start-save" type="button">Save Startup Settings</button>
            <p class="session-start-feedback"></p>
          </div>
          <div class="session-theme-controls">
            <label class="session-theme-label" for="">Color Set</label>
            <select class="session-theme-select">
              <option value="default">Default</option>
              <option value="gruvbox-dark">Gruvbox Dark</option>
              <option value="solarized-dark">Solarized Dark</option>
              <option value="custom">Custom</option>
            </select>
            <label class="session-theme-label" for="">Custom Background</label>
            <input class="session-theme-bg" type="text" value="#0a0d12" />
            <label class="session-theme-label" for="">Custom Foreground</label>
            <input class="session-theme-fg" type="text" value="#d8dee9" />
            <button class="session-theme-apply" type="button">Apply Theme</button>
          </div>
          <div class="session-settings-actions">
            <button class="session-rename" type="button">Rename</button>
            <button class="session-close" type="button">Close</button>
          </div>
        </dialog>
        <div class="terminal-mount"></div>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
